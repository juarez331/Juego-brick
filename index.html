<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  let score = 0;
  let explosion = null;
  let stars = [];

  // ── Objetos de fondo estéticos ──────────────────────────────────
  let bgComets  = [];   // cometas con cola
  let bgPlanets = [];   // planetas/asteroides lentos
  let bgShips   = [];   // naves de fondo que cruzan la pantalla

function createStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2,
      speed: Math.random() * 0.5 + 0.2
    });
  }
}

// ── HELPERS: spawn de objetos de fondo ──────────────────────────

function spawnBgComet() {
  const fromLeft = Math.random() < 0.5;
  const x = fromLeft ? -20 : canvas.width + 20;
  const y = Math.random() * canvas.height * 0.7;
  const speed = 4 + Math.random() * 4;
  const angle = (Math.random() * 30 - 15) * (Math.PI / 180);
  const dir = fromLeft ? 1 : -1;
  
  // Variedad de tamaños: 60% chicos, 40% grandes
  const isLarge = Math.random() < 0.4;
  const size = isLarge ? (8 + Math.random() * 8) : (3 + Math.random() * 3);
  
  bgComets.push({
    x, y,
    vx: dir * speed * Math.cos(angle),
    vy: speed * Math.sin(angle) + 1,
    size: size,
    tail: [],
    color: Math.random() < 0.5 ? '#88ccff' : '#ffffaa'
  });
}

function spawnBgPlanet() {
  const fromLeft = Math.random() < 0.5;
  const r = 50 + Math.random() * 80;
  const x = fromLeft ? -r : canvas.width + r;
  const y = 80 + Math.random() * (canvas.height - 160);
  const speed = 0.6 + Math.random() * 0.6;
  const hue = Math.floor(Math.random() * 360);
  const hasRing = Math.random() < 0.4;
  bgPlanets.push({ x, y, r, vx: fromLeft ? speed : -speed, hue, hasRing });
}

function spawnBgShip() {
  const fromLeft = Math.random() < 0.5;
  const x = fromLeft ? -60 : canvas.width + 60;
  const y = 100 + Math.random() * (canvas.height - 200);
  const speed = 2.0 + Math.random() * 2.5; 
  const scale = 0.6 + Math.random() * 0.6; 
  bgShips.push({
    x, y,
    vx: fromLeft ? speed : -speed,
    scale,
    color: `hsl(${Math.floor(Math.random()*360)},70%,70%)`
  });
}

// ── DRAW: objetos de fondo ───────────────────────────────────────

function drawBgComets() {
  for (let i = bgComets.length - 1; i >= 0; i--) {
    const c = bgComets[i];
    c.tail.unshift({ x: c.x, y: c.y });
    if (c.tail.length > 18) c.tail.pop();

    for (let t = 0; t < c.tail.length; t++) {
      const alpha = (1 - t / c.tail.length) * 0.7;
      ctx.beginPath();
      ctx.arc(c.tail[t].x, c.tail[t].y, c.size * (1 - t / c.tail.length), 0, Math.PI * 2);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = c.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.shadowBlur = 10;
    ctx.shadowColor = c.color;
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.shadowBlur = 0;

    c.x += c.vx;
    c.y += c.vy;

    if (c.x < -60 || c.x > canvas.width + 60 || c.y > canvas.height + 60) {
      bgComets.splice(i, 1);
    }
  }
}

function drawBgPlanets() {
  for (let i = bgPlanets.length - 1; i >= 0; i--) {
    const p = bgPlanets[i];
    const ringColor = `hsl(${p.hue},60%,70%)`;
    const ringTilt  = 0.3;

    if (p.hasRing) {
      ctx.save();
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = ringColor;
      ctx.lineWidth = p.r * 0.18;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r * 2.2, p.r * 0.45, ringTilt, Math.PI, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.save();
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    const grad = ctx.createRadialGradient(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.1, p.x, p.y, p.r);
    grad.addColorStop(0,   `hsl(${p.hue},70%,80%)`);
    grad.addColorStop(0.5, `hsl(${p.hue},60%,40%)`);
    grad.addColorStop(1,   `hsl(${p.hue},50%,5%)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    if (p.hasRing) {
      ctx.save();
      ctx.globalAlpha = 0.45;
      ctx.strokeStyle = ringColor;
      ctx.lineWidth = p.r * 0.18;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r * 2.2, p.r * 0.45, ringTilt, 0, Math.PI);
      ctx.stroke();
      ctx.restore();
    }

    p.x += p.vx;
    if (p.x < -p.r - 20 || p.x > canvas.width + p.r + 20) {
      bgPlanets.splice(i, 1);
    }
  }
}

function drawBgShips() {
  for (let i = bgShips.length - 1; i >= 0; i--) {
    const s = bgShips[i];
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.translate(s.x, s.y);
    ctx.scale(s.vx > 0 ? s.scale : -s.scale, s.scale);

    ctx.shadowBlur = 8;
    ctx.shadowColor = s.color;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.moveTo(30, 0);    
    ctx.lineTo(-15, -12); 
    ctx.lineTo(-8, 0);
    ctx.lineTo(-15, 12);  
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.ellipse(8, 0, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.5;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.moveTo(-8, -4);
    ctx.lineTo(-28, 0);
    ctx.lineTo(-8, 4);
    ctx.closePath();
    ctx.fill();

    ctx.globalAlpha = 1;
    ctx.restore();

    s.x += s.vx;
    if (s.x < -80 || s.x > canvas.width + 80) {
      bgShips.splice(i, 1);
    }
  }
}

  let enemy = {

  width: 80,
  height: 40,

};

let enemy2 = {
  x: 20,
  y: canvas.height / 2,

  direction: 1
};          

let enemy3 = {

};

let enemy4 = {

};

  let bullets = [];
  let bullets2 = [];
  let bullets3 = [];
  let bullets4 = [];
  let showTarget = true;

  const target = {
    x: 0,
    radius: 45,
    vx: 2, 
    vy: 2,
    hitAnim: 0 
  };
  
  const topMargin = 80;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    target.x = canvas.width / 2;
    target.y = canvas.height / 2;
    enemy.x = canvas.width / 2 - enemy.width / 2;
    enemy2.x = 10;
    enemy2.y = canvas.height / 2;
    enemy3.x = canvas.width - 20;
    enemy3.y = canvas.height / 2;
    enemy4.x = canvas.width / 2 - enemy4.width / 2;
    enemy4.y = canvas.height - 50;

    bullets = [];
    bullets2 = [];
    bullets3 = [];
    bullets4 = [];

    createStars();
  }

  window.addEventListener("resize", resizeCanvas);

  function drawBackground() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    stars.forEach(star => {
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
      star.y += star.speed;
      if (star.y > canvas.height) {
        star.y = 0;
        star.x = Math.random() * canvas.width;
      }
    });
  }

  function drawTarget() {
    if (!showTarget) return;
    const isHit = target.hitAnim > 0;
    const currentRadius = isHit ? target.radius + 8 : target.radius;
    
    ctx.beginPath();
    const auraGrad = ctx.createRadialGradient(target.x, target.y, 5, target.x, target.y, currentRadius + 15);
    if (isHit) {
      auraGrad.addColorStop(0, "rgba(0, 255, 255, 0.8)");
      auraGrad.addColorStop(1, "rgba(0, 255, 255, 0)");
      ctx.shadowColor = "#00ffff";
      ctx.shadowBlur = 40;
    } else {
      auraGrad.addColorStop(0, "rgba(128, 0, 255, 0.4)");
      auraGrad.addColorStop(1, "rgba(128, 0, 255, 0)");
      ctx.shadowColor = "#8000ff";
      ctx.shadowBlur = 20;
    }
    ctx.fillStyle = auraGrad;
    ctx.arc(target.x, target.y, currentRadius + 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.closePath();

    ctx.beginPath();
    const gradient = ctx.createRadialGradient(target.x, target.y, 5, target.x, target.y, currentRadius);
    if (isHit) {
      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(0.4, "#00ffff");
      gradient.addColorStop(1, "#008888");
    } else {
      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(0.4, "#ff00ff");
      gradient.addColorStop(1, "#440088");
    }
    ctx.fillStyle = gradient;
    ctx.arc(target.x, target.y, currentRadius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = isHit ? "#ffffff" : "rgba(255,255,255,0.3)";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.closePath();

    ctx.beginPath();
    ctx.fillStyle = "white";
    ctx.arc(target.x, target.y, isHit ? 15 : 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.closePath();
    ctx.shadowBlur = 0;
  }

  function drawExplosion() {
    if (!explosion) return;
    ctx.beginPath();
    ctx.arc(explosion.x, explosion.y, explosion.radius, 0, Math.PI * 2);
    ctx.strokeStyle = "cyan";
    ctx.lineWidth = 4;
    ctx.stroke();
    ctx.closePath();
    explosion.radius += 5;
    if (explosion.radius > 60) explosion = null;
  }

  function drawScore() {
    ctx.fillStyle = "lime";
    let fontSize = window.innerWidth < 600 ? 12 : 20;
    ctx.font = fontSize + "px 'Press Start 2P'";
    ctx.textAlign = "left";
    ctx.fillText("Puntos: " + score, 20, 30);
  }

  function drawTimer() {
    ctx.fillStyle = "cyan";
    let fontSize = window.innerWidth < 600 ? 12 : 20;
    ctx.font = fontSize + "px 'Press Start 2P'";
    ctx.textAlign = "right";
    ctx.fillText("Tiempo: " + timeLeft,  canvas.width - 20, 30);
  }

  function drawGoal() {
    ctx.fillStyle = "white";
    let fontSize = window.innerWidth < 600 ? 12 : 20;
    ctx.font = fontSize + "px 'Press Start 2P'";
    ctx.textAlign = "right";
    let targetGoal = (level >= 8) ? 15 : 20; 
    ctx.fillText("Meta: " + targetGoal, canvas.width - 20, 60);
  }

  function drawLevel() {
    ctx.fillStyle = "yellow";
    let fontSize = window.innerWidth < 600 ? 12 : 20;
    ctx.font = fontSize + "px 'Press Start 2P'";
    ctx.textAlign = "left";
    ctx.fillText("Nivel: " + level, 20, 60);
  }

  function drawEnemy() {
    ctx.save();
    ctx.translate(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00f5ff";
    ctx.fillStyle = "#3333aa";
    ctx.beginPath();
    ctx.moveTo(-35, 5);
    ctx.lineTo(-15, -15);
    ctx.lineTo(15, -15);
    ctx.lineTo(35, 5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#6666ff";
    ctx.beginPath();
    ctx.moveTo(0, 20);
    ctx.lineTo(20, -15);
    ctx.lineTo(-20, -15);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
    ctx.beginPath();
    ctx.arc(-3, -4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#00f5ff";
    ctx.fillRect(-12, -18, 6, 4);
    ctx.fillRect(6, -18, 6, 4);
    ctx.restore();
    if (level === 3 || level >= 5) {
      const spd1 = level >= 10 ? 5 : 3;
      enemy.x += spd1 * enemy.direction;
      if (enemy.x + enemy.width > canvas.width || enemy.x < 0) enemy.direction *= -1;
    }
  }

  function drawEnemy2() {
    if (level < 4) return;
    ctx.save();
    ctx.translate(enemy2.x + enemy2.width / 2, enemy2.y + enemy2.height / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ff0000";
    ctx.fillStyle = "#aa0000";
    ctx.beginPath();
    ctx.moveTo(0, 25);
    ctx.lineTo(30, -10);
    ctx.lineTo(-30, -10);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.moveTo(0, 30);
    ctx.lineTo(15, -15);
    ctx.lineTo(-15, -15);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#ffff00";
    ctx.beginPath();
    ctx.arc(0, 5, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const spd2 = level >= 10 ? 5 : 3;
    enemy2.y += spd2 * enemy2.direction;
    if (enemy2.y < 100 || enemy2.y > canvas.height - 100) enemy2.direction *= -1;
  }

  function drawEnemy3() {
    if (level < 6) return;
    ctx.save();
    ctx.translate(enemy3.x + enemy3.width / 2, enemy3.y + enemy3.height / 2);
    ctx.rotate(Math.PI / 2);
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00ff00";
    ctx.fillStyle = "#228822";
    ctx.beginPath();
    ctx.ellipse(0, 0, 35, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#44ff44";
    ctx.beginPath();
    ctx.ellipse(0, -3, 20, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(-15, 0, 4, 0, Math.PI * 2);
    ctx.arc(15, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const spd3 = level >= 10 ? 5 : 3;
    enemy3.y += spd3 * enemy3.direction;
    if (enemy3.y < 100 || enemy3.y > canvas.height - 100) enemy3.direction *= -1;
  }

  function drawEnemy4() {
    if (level < 7) return;
    ctx.save();
    ctx.translate(enemy4.x + enemy4.width / 2, enemy4.y + enemy4.height / 2);
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ff00ff";
    ctx.fillStyle = "#880088";
    ctx.beginPath();
    ctx.moveTo(-40, 15);
    ctx.lineTo(0, -25);
    ctx.lineTo(40, 15);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#ff00ff";
    ctx.beginPath();
    ctx.moveTo(-15, 20);
    ctx.lineTo(0, -30);
    ctx.lineTo(15, 20);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(0, 5, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    const spd4 = level >= 10 ? 5 : 3;
    enemy4.x += spd4 * enemy4.direction;
    if (enemy4.x + enemy4.width > canvas.width || enemy4.x < 0) enemy4.direction *= -1;
  }

  function shootBullet() {
    const dx = target.x - (enemy.x + enemy.width / 2);
    const dy = target.y - (enemy.y + enemy.height / 2);
    const distance = Math.sqrt(dx * dx + dy * dy);
    const speed = 5;
    const isSuper = level === 9 && Math.random() < 0.25;
    bullets.push({
      x: enemy.x + enemy.width / 2,
      y: enemy.y + enemy.height / 2,
      vx: (dx / distance) * speed,
      vy: (dy / distance) * speed,
      super: isSuper
    });
  }

  function drawBulletHelper(b, color) {
    if (b.super) {
      ctx.fillStyle = "#ff6600";
      ctx.shadowBlur = 15;
      ctx.shadowColor = "red";
      ctx.beginPath();
      ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
      let b = bullets[i];
      drawBulletHelper(b, "yellow");
      b.x += b.vx;
      b.y += b.vy;
      const dist = Math.sqrt((b.x - target.x) ** 2 + (b.y - target.y) ** 2);
      if (dist < target.radius) {
        score -= b.super ? 2 : 1;
        bullets.splice(i, 1);
        continue;
      }
      if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    }
  }

  function drawBullets2() {
    for (let i = bullets2.length - 1; i >= 0; i--) {
      let b = bullets2[i];
      drawBulletHelper(b, "red");
      b.x += b.vx;
      b.y += b.vy;
      const dist = Math.sqrt((b.x - target.x) ** 2 + (b.y - target.y) ** 2);
      if (dist < target.radius) {
        score -= b.super ? 2 : 1;
        bullets2.splice(i, 1);
        continue;
      }
      if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets2.splice(i, 1);
    }
  }

  function drawBullets3() {
    for (let i = bullets3.length - 1; i >= 0; i--) {
      let b = bullets3[i];
      drawBulletHelper(b, "lime");
      b.x += b.vx;
      b.y += b.vy;
      const dist = Math.sqrt((b.x - target.x) ** 2 + (b.y - target.y) ** 2);
      if (dist < target.radius) {
        score -= b.super ? 2 : 1;
        bullets3.splice(i, 1);
        continue;
      }
      if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets3.splice(i, 1);
    }
  }

  function drawBullets4() {
    for (let i = bullets4.length - 1; i >= 0; i--) {
      let b = bullets4[i];
      drawBulletHelper(b, "magenta");
      b.x += b.vx;
      b.y += b.vy;
      const dist = Math.sqrt((b.x - target.x) ** 2 + (b.y - target.y) ** 2);
      if (dist < target.radius) {
        score -= b.super ? 2 : 1;
        bullets4.splice(i, 1);
        continue;
      }
      if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets4.splice(i, 1);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    drawBgPlanets();
    drawBgComets();
    drawBgShips();
    drawTarget();
    drawExplosion();
    drawScore();
    drawTimer();
    drawLevel();
    drawGoal();

    if (!levelCompleted && !gameOver) {
      drawEnemy();
      drawEnemy2();
      drawEnemy3();
      drawEnemy4();
      drawBullets();
      drawBullets2();
      drawBullets3();
      drawBullets4();
    }

    if (!gameStarted) {
      ctx.fillStyle = "white";
      let fontSize = window.innerWidth < 600 ? 20 : 36;
      ctx.font = fontSize + "px 'Press Start 2P'";
      ctx.textAlign = "center";
      ctx.shadowColor = "cyan";
      ctx.shadowBlur = 15;
      ctx.fillText("CLICK RUSH", canvas.width / 2, canvas.height / 5);
      ctx.shadowBlur = 0;

      let fontSizeInstr = window.innerWidth < 600 ? 12 : 16;
      ctx.font = fontSizeInstr + "px 'Press Start 2P'";
      ctx.fillStyle = "#aaa";
      ctx.fillText("MISIÓN: CARGA EL NÚCLEO", canvas.width / 2, canvas.height / 5 + 70);
      ctx.fillText("Hacé click para recolectar energía", canvas.width / 2, canvas.height / 5 + 105);
      ctx.fillStyle = "#f55";
      ctx.fillText("¡CUIDADO! Las balas", canvas.width / 2, canvas.height / 5 + 140);
      ctx.fillText("drenan tu energía", canvas.width / 2, canvas.height / 5 + 170);

      let fontSize2 = window.innerWidth < 600 ? 12 : 18;
      ctx.font = fontSize2 + "px 'Press Start 2P'";
      ctx.fillStyle = "yellow";
      ctx.fillText("-- SELECCIONA TU NIVEL --", canvas.width / 2, canvas.height / 2 + 30);

      const menuItems = [
        "Presiona 1 - Nivel 1",
        "Presiona 2 - Nivel 2",
        "Presiona 3 - Nivel 3",
        "Presiona 4 - Nivel 4",
        "Presiona 5 - Nivel 5",
        "Presiona 6 - Nivel 6",
        "Presiona 7 - Nivel 7",
        "Presiona 8 - Nivel 8",
        "Presiona 9 - Nivel 9",
        "Presiona 0 - Nivel 10"
      ];

      ctx.textAlign = "left";
      const longestW = ctx.measureText("Presiona 0 - Nivel 10").width;
      const startX = canvas.width / 2 - longestW / 2;
      const baseY = canvas.height / 2 + 70;

      menuItems.forEach((text, i) => {
        ctx.fillStyle = (i >= 7) ? "#f88" : "white";
        ctx.fillText(text, startX, baseY + (i * 30));
      });
      return;
    }

    if (levelCompleted) {
      ctx.fillStyle = "black";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = "lime";
      ctx.textAlign = "center";
      let fontSize = window.innerWidth < 600 ? 20 : 40;
      ctx.font = fontSize + "px 'Press Start 2P'";
      ctx.fillText("NIVEL COMPLETADO", canvas.width/2, canvas.height/2 - 40);

      const btnWidth = window.innerWidth < 600 ? 200 : 300;
      const btnHeight = 60;
      const btnX = canvas.width/2 - btnWidth/2;
      const btnY = canvas.height/2 + 20;
      ctx.fillStyle = "#333";
      ctx.fillRect(btnX, btnY, btnWidth, btnHeight);
      ctx.strokeStyle = "lime";
      ctx.lineWidth = 3;
      ctx.strokeRect(btnX, btnY, btnWidth, btnHeight);
      ctx.fillStyle = "lime";
      ctx.font = (window.innerWidth < 600 ? 12 : 16) + "px 'Press Start 2P'";
      ctx.fillText("SIGUIENTE NIVEL", canvas.width/2, btnY + 40);
      return;
    }

    if (gameOver) {
      ctx.fillStyle = "red";
      let fontSize = window.innerWidth < 600 ? 25 : 50;
      ctx.font = fontSize + "px 'Press Start 2P'";
      ctx.textAlign = "center";
      ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
    }
  }

  function restartGame() {
    score = 0;
    timeLeft = 30;
    gameOver = false;
    showTarget = true;
    target.x = canvas.width / 2;
    target.y = canvas.height / 2;
    explosion = null;
  }

  function gameLoop() {
    if (gameStarted && !gameOver && !levelCompleted && level >= 8) {
      const baseSpeed = level >= 10 ? 3.5 : 2;
      if (Math.abs(target.vx) < baseSpeed) target.vx = Math.sign(target.vx || 1) * baseSpeed;
      if (Math.abs(target.vy) < baseSpeed) target.vy = Math.sign(target.vy || 1) * baseSpeed;
      target.x += target.vx;
      target.y += target.vy;
      if (target.x + target.radius > canvas.width || target.x - target.radius < 0) target.vx *= -1;
      if (target.y + target.radius > canvas.height || target.y - target.radius < topMargin) target.vy *= -1;
    }
    if (target.hitAnim > 0) target.hitAnim--;
    draw();
    requestAnimationFrame(gameLoop);
  }

  function checkHit(x, y) {
    if (gameOver) return;
    const distance = Math.sqrt((x - target.x) ** 2 + (y - target.y) ** 2);
    if (distance < target.radius) {
      score++;
      target.hitAnim = 10;
      explosion = { x: target.x, y: target.y, radius: 10 };
      target.x = Math.random() * (canvas.width - target.radius * 2) + target.radius;
      target.y = Math.random() * (canvas.height - target.radius * 2 - topMargin) + target.radius + topMargin;
    }
  }

  canvas.addEventListener("click", function(event) {
    if (!gameStarted) {
      const y = event.clientY;
      if (y < canvas.height / 2 + 100) level = 1;
      else if (y < canvas.height / 2 + 135) level = 2;
      else if (y < canvas.height / 2 + 170) level = 3;
      else if (y < canvas.height / 2 + 205) level = 4;
      else if (y < canvas.height / 2 + 240) level = 5;
      else if (y < canvas.height / 2 + 275) level = 6;
      else if (y < canvas.height / 2 + 310) level = 7;
      else if (y < canvas.height / 2 + 345) level = 8;
      else if (y < canvas.height / 2 + 380) level = 9;
      else level = 10;
      timeLeft = 20;
      gameStarted = true;
      gameOver = false;
      score = 0;
      bullets = []; bullets2 = []; bullets3 = []; bullets4 = [];
      return;
    }
    if (gameOver) { restartGame(); return; }
    const rect = canvas.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;
    if (levelCompleted) {
      const btnX = canvas.width/2 - (window.innerWidth < 600 ? 100 : 150);
      const btnY = canvas.height/2 + 20;
      if (x >= btnX && x <= btnX + (window.innerWidth < 600 ? 200 : 300) && y >= btnY && y <= btnY + 100) {
        level++; levelCompleted = false; score = 0; timeLeft = 20;
        bullets = []; bullets2 = []; bullets3 = []; bullets4 = [];
      }
      return;
    }
    checkHit(x, y);
  });

  canvas.addEventListener("touchstart", function(event) {
    const rect = canvas.getBoundingClientRect();
    const touch = event.touches[0];
    const x = touch.clientX - rect.left;
    const y = touch.clientY - rect.top;
    if (!gameStarted) {
      if (y < canvas.height / 2 + 100) level = 1;
      else if (y < canvas.height / 2 + 135) level = 2;
      else if (y < canvas.height / 2 + 170) level = 3;
      else if (y < canvas.height / 2 + 205) level = 4;
      else if (y < canvas.height / 2 + 240) level = 5;
      else if (y < canvas.height / 2 + 275) level = 6;
      else if (y < canvas.height / 2 + 310) level = 7;
      else if (y < canvas.height / 2 + 345) level = 8;
      else if (y < canvas.height / 2 + 380) level = 9;
      else level = 10;
      timeLeft = 20;
      gameStarted = true;
      gameOver = false;
      score = 0;
      bullets = []; bullets2 = []; bullets3 = []; bullets4 = [];
      return;
    }
    if (levelCompleted) {
      const btnX = canvas.width/2 - (window.innerWidth < 600 ? 100 : 150);
      const btnY = canvas.height/2 + 20;
      if (x >= btnX && x <= btnX + (window.innerWidth < 600 ? 200 : 300) && y >= btnY && y <= btnY + 100) {
        level++; levelCompleted = false; score = 0; timeLeft = 20;
        bullets = []; bullets2 = []; bullets3 = []; bullets4 = [];
      }
      return;
    }
    if (gameOver) { restartGame(); return; }
    checkHit(x, y);
  });

  resizeCanvas();
  createStars();

  setInterval(function() {
    if (gameStarted && !gameOver && !levelCompleted) {
      timeLeft--;
      if (timeLeft <= 0) {
        let n = (level >= 8) ? 15 : 20;
        if (score >= n) levelCompleted = true;
        else { gameOver = true; explosion = { x: target.x, y: target.y, radius: 10 }; showTarget = false; }
      }
    }
  }, 1000);

  setInterval(function() {
    if (!gameStarted || gameOver || levelCompleted) return;
    if (level >= 1 && level < 8) {
      if (level === 1 && Math.random() > 0.5) return;
      shootBullet();
      if (level >= 4) {
        let dx = target.x - (enemy2.x + enemy2.width/2), dy = target.y - (enemy2.y + enemy2.height/2), d = Math.sqrt(dx*dx+dy*dy);
        bullets2.push({ x: enemy2.x + enemy2.width/2, y: enemy2.y + enemy2.height/2, vx: (dx/d)*5, vy: (dy/d)*5 });
      }
      if (level >= 6) {
        let dx = target.x - (enemy3.x + enemy3.width/2), dy = target.y - (enemy3.y + enemy3.height/2), d = Math.sqrt(dx*dx+dy*dy);
        bullets3.push({ x: enemy3.x + enemy3.width/2, y: enemy3.y + enemy3.height/2, vx: (dx/d)*5, vy: (dy/d)*5 });
      }
      if (level >= 7) {
        let dx = target.x - (enemy4.x + enemy4.width/2), dy = target.y - (enemy4.y + enemy4.height/2), d = Math.sqrt(dx*dx+dy*dy);
        bullets4.push({ x: enemy4.x + enemy4.width/2, y: enemy4.y + enemy4.height/2, vx: (dx/d)*5, vy: (dy/d)*5 });
      }
    }
  }, 2000);

  setInterval(function() {
    if (!gameStarted || gameOver || levelCompleted || (level !== 8 && level !== 9)) return;
    shootBullet();
    let s = level === 9 && Math.random() < 0.25;
    let dx2 = target.x - (enemy2.x + enemy2.width/2), dy2 = target.y - (enemy2.y + enemy2.height/2), d2 = Math.sqrt(dx2*dx2+dy2*dy2);
    bullets2.push({ x: enemy2.x + enemy2.width/2, y: enemy2.y + enemy2.height/2, vx: (dx2/d2)*5, vy: (dy2/d2)*5, super: s });
    let dx3 = target.x - (enemy3.x + enemy3.width/2), dy3 = target.y - (enemy3.y + enemy3.height/2), d3 = Math.sqrt(dx3*dx3+dy3*dy3);
    bullets3.push({ x: enemy3.x + enemy3.width/2, y: enemy3.y + enemy3.height/2, vx: (dx3/d3)*5, vy: (dy3/d3)*5, super: s });
    let dx4 = target.x - (enemy4.x + enemy4.width/2), dy4 = target.y - (enemy4.y + enemy4.height/2), d4 = Math.sqrt(dx4*dx4+dy4*dy4);
    bullets4.push({ x: enemy4.x + enemy4.width/2, y: enemy4.y + enemy4.height/2, vx: (dx4/d4)*5, vy: (dy4/d4)*5, super: s });
  }, 1000);

  setInterval(function() {
    if (!gameStarted || gameOver || levelCompleted || level !== 10) return;
    shootBullet();
    let s = Math.random() < 0.35;
    let dx2 = target.x - (enemy2.x + enemy2.width/2), dy2 = target.y - (enemy2.y + enemy2.height/2), d2 = Math.sqrt(dx2*dx2+dy2*dy2);
    bullets2.push({ x: enemy2.x + enemy2.width/2, y: enemy2.y + enemy2.height/2, vx: (dx2/d2)*6, vy: (dy2/d2)*6, super: s });
    let dx3 = target.x - (enemy3.x + enemy3.width/2), dy3 = target.y - (enemy3.y + enemy3.height/2), d3 = Math.sqrt(dx3*dx3+dy3*dy3);
    bullets3.push({ x: enemy3.x + enemy3.width/2, y: enemy3.y + enemy3.height/2, vx: (dx3/d3)*6, vy: (dy3/d3)*6, super: s });
    let dx4 = target.x - (enemy4.x + enemy4.width/2), dy4 = target.y - (enemy4.y + enemy4.height/2), d4 = Math.sqrt(dx4*dx4+dy4*dy4);
    bullets4.push({ x: enemy4.x + enemy4.width/2, y: enemy4.y + enemy4.height/2, vx: (dx4/d4)*6, vy: (dy4/d4)*6, super: s });
  }, 600);

  setInterval(function() { if (canvas.width > 0) spawnBgComet(); }, 6000 + Math.random() * 4000);
  setInterval(function() { if (canvas.width > 0) spawnBgPlanet(); }, 20000 + Math.random() * 20000);
  setInterval(function() { if (canvas.width > 0) spawnBgShip(); }, 8000 + Math.random() * 6000);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW ok', reg))
        .catch(err => console.log('SW error', err));
    });
  }

  gameLoop();
</script>
</body>
</html>
